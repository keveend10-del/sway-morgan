<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sway — June Recap</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  }

  .card {
    width: 390px;
    height: 844px;
    background: #0A0A0A;
    border-radius: 48px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 52px 36px 44px;
    gap: 0;
    box-shadow: 0 0 0 1px rgba(201,168,76,0.08), 0 40px 80px rgba(0,0,0,0.8);
  }

  /* Subtle gold ambient glow at top */
  .card::before {
    content: '';
    position: absolute;
    top: -60px;
    left: 50%;
    transform: translateX(-50%);
    width: 280px;
    height: 180px;
    background: radial-gradient(ellipse, rgba(201,168,76,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Header */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 40px;
  }

  .wordmark {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: #C9A84C;
    text-transform: uppercase;
  }

  .month-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: #4A4A4A;
    text-transform: uppercase;
    text-align: right;
    line-height: 1;
  }

  /* Hero section */
  .hero {
    margin-bottom: 36px;
  }

  .recap-label {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: #5A5A5A;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .hero-month {
    font-size: 64px;
    font-weight: 800;
    color: #C9A84C;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 4px;
  }

  /* Big stat */
  .stat-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 28px;
    padding: 32px 0 28px;
  }

  .stat-number {
    font-size: 108px;
    font-weight: 800;
    color: #C9A84C;
    letter-spacing: -0.05em;
    line-height: 1;
    margin-bottom: 8px;
  }

  .stat-label {
    font-size: 13px;
    font-weight: 400;
    color: #5A5A5A;
    letter-spacing: 0.04em;
    margin-bottom: 20px;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 1px solid rgba(201,168,76,0.45);
    border-radius: 100px;
    padding: 7px 18px;
  }

  .crown-icon {
    font-size: 12px;
    color: #C9A84C;
  }

  .status-text {
    font-size: 12px;
    font-weight: 500;
    color: #C9A84C;
    letter-spacing: 0.06em;
  }

  /* Divider */
  .divider {
    width: 100%;
    height: 1px;
    background: rgba(201,168,76,0.12);
    margin-bottom: 28px;
  }

  /* Section label */
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    color: rgba(201,168,76,0.5);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  /* People list */
  .people-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 28px;
  }

  .person-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    color: #C9A84C;
    flex-shrink: 0;
  }

  .person-name {
    font-size: 14px;
    font-weight: 500;
    color: #E8E0D0;
    flex: 1;
  }

  .person-sessions {
    font-size: 12px;
    font-weight: 400;
    color: #4A4A4A;
    letter-spacing: 0.02em;
  }

  .person-bar-track {
    position: absolute;
    right: 36px;
    width: 60px;
    height: 2px;
    background: rgba(201,168,76,0.08);
    border-radius: 2px;
  }

  /* Bar chart */
  .chart-section {
    margin-bottom: 36px;
  }

  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    height: 52px;
    margin-bottom: 10px;
  }

  .bar-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex: 1;
  }

  .bar {
    width: 100%;
    border-radius: 3px 3px 0 0;
    transition: all 0.3s;
  }

  .bar.active {
    background: #C9A84C;
  }

  .bar.muted {
    background: rgba(201,168,76,0.18);
  }

  .bar-day {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: #3A3A3A;
    text-transform: uppercase;
  }

  .bar-day.active {
    color: #C9A84C;
  }

  .peak-label {
    font-size: 11px;
    font-weight: 400;
    color: #4A4A4A;
    letter-spacing: 0.04em;
    margin-top: 4px;
  }

  .peak-label span {
    color: #C9A84C;
  }

  /* Footer tagline */
  .footer {
    margin-top: auto;
    text-align: center;
  }

  .tagline-line1 {
    font-size: 18px;
    font-weight: 400;
    color: #E8E0D0;
    letter-spacing: 0.01em;
    line-height: 1.3;
  }

  .tagline-line2 {
    font-size: 18px;
    font-weight: 600;
    color: #C9A84C;
    letter-spacing: 0.01em;
    line-height: 1.3;
  }

  /* Rank dots next to people */
  .rank-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(201,168,76,0.3);
    flex-shrink: 0;
  }

  .rank-1 .rank-dot { background: rgba(201,168,76,0.9); }
  .rank-2 .rank-dot { background: rgba(201,168,76,0.6); }
  .rank-3 .rank-dot { background: rgba(201,168,76,0.4); }
  .rank-4 .rank-dot { background: rgba(201,168,76,0.25); }

</style>
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="wordmark">Sway</div>
    <div class="month-label">June 2026</div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="recap-label">Your recap</div>
    <div class="hero-month">June.</div>
  </div>

  <!-- Big stat -->
  <div class="stat-block">
    <div class="stat-number">18</div>
    <div class="stat-label">sessions this semester</div>
    <div class="status-pill">
      <span class="crown-icon">♛</span>
      <span class="status-text">VIP Regular &nbsp;·&nbsp; Gully's</span>
    </div>
  </div>

  <!-- Divider -->
  <div class="divider"></div>

  <!-- Who you showed up with -->
  <div class="section-label">Who you showed up with</div>
  <div class="people-list">
    <div class="person-row rank-1">
      <div class="avatar">M</div>
      <div class="person-name">Maya</div>
      <div class="rank-dot"></div>
      <div class="person-sessions">18 together</div>
    </div>
    <div class="person-row rank-2">
      <div class="avatar">J</div>
      <div class="person-name">Jordyn</div>
      <div class="rank-dot"></div>
      <div class="person-sessions">16 together</div>
    </div>
    <div class="person-row rank-3">
      <div class="avatar">S</div>
      <div class="person-name">Sam</div>
      <div class="rank-dot"></div>
      <div class="person-sessions">14 together</div>
    </div>
    <div class="person-row rank-4">
      <div class="avatar">R</div>
      <div class="person-name">Riley</div>
      <div class="rank-dot"></div>
      <div class="person-sessions">11 together</div>
    </div>
  </div>

  <!-- Divider -->
  <div class="divider"></div>

  <!-- When you show up -->
  <div class="chart-section">
    <div class="section-label">When you show up</div>
    <div class="bar-chart">
      <div class="bar-col">
        <div class="bar muted" style="height: 10px;"></div>
        <div class="bar-day">M</div>
      </div>
      <div class="bar-col">
        <div class="bar muted" style="height: 8px;"></div>
        <div class="bar-day">T</div>
      </div>
      <div class="bar-col">
        <div class="bar muted" style="height: 14px;"></div>
        <div class="bar-day">W</div>
      </div>
      <div class="bar-col">
        <div class="bar active" style="height: 34px;"></div>
        <div class="bar-day active">Th</div>
      </div>
      <div class="bar-col">
        <div class="bar active" style="height: 44px;"></div>
        <div class="bar-day active">F</div>
      </div>
      <div class="bar-col">
        <div class="bar active" style="height: 52px;"></div>
        <div class="bar-day active">Sa</div>
      </div>
      <div class="bar-col">
        <div class="bar muted" style="height: 22px;"></div>
        <div class="bar-day">Su</div>
      </div>
    </div>
    <div class="peak-label">Peak night — <span>Sat · 12:30 AM</span></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="tagline-line1">You showed up.</div>
    <div class="tagline-line2">Sway remembered.</div>
  </div>

</div>

</body>
</html>
